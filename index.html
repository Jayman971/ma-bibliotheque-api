<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma Bibliothèque</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        const API_CONFIG = {
            BASE_URL: 'https://ma-bibliotheque-api.onrender.com/api/v1',
            HEALTH_CHECK_INTERVAL: 60000,
            CACHE_DURATION: 60000,
            AUTOCOMPLETE_DELAY: 300
        };
    </script>
    <style>
        /* ✅ Styles spécifiques pour la barre de progression (Objectif de lecture) */
        .goal-container { margin: 25px auto; padding: 20px; background: var(--bg-secondary); border-radius: 15px; box-shadow: 0 4px 15px var(--shadow); max-width: 600px; text-align: center; }
        .goal-bar-bg { background: #e0e0e0; border-radius: 10px; height: 25px; width: 100%; overflow: hidden; margin: 15px 0; position: relative; }
        .goal-bar-fill { background: linear-gradient(90deg, var(--color-primary), var(--color-secondary)); height: 100%; transition: width 0.8s ease-out; }
        .goal-text { position: absolute; width: 100%; text-align: center; line-height: 25px; color: white; font-weight: bold; font-size: 0.9em; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }
        body.dark-mode .goal-bar-bg { background: #2c3e50; }
        
        /* ✅ Styles pour les doublons et recommandations */
        .duplicate-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid var(--border-color); }
        .btn-clean { background-color: var(--color-warning); color: #000; }
        .btn-clean:hover { background-color: #e0a800; }
        
        .reco-container { max-width: 1200px; margin: 40px auto; padding: 20px; }
        .reco-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-top: 20px; }
        .reco-card { background: var(--bg-secondary); border-radius: 10px; padding: 15px; text-align: center; box-shadow: 0 4px 8px var(--shadow); cursor: pointer; transition: transform 0.2s;}
        .reco-card:hover { transform: scale(1.05); }
        .reco-card img { max-height: 150px; border-radius: 5px; margin-bottom: 10px; }
    </style>
</head>
<body class="light-mode">
    <header>
        <div class="header-content">
            <h1 class="app-title"><i class="fas fa-book-open"></i> Ma Bibliothèque</h1>
            <div class="header-controls">
                <button id="darkModeToggle" class="icon-btn"><i class="fas fa-moon"></i></button>
                <button id="notificationsBtn" class="icon-btn" style="display: none;">
                    <i class="fas fa-bell"></i><span class="notification-badge" id="notificationBadge"></span>
                </button>
            </div>
        </div>
        <nav id="mainNav"></nav>
    </header>

    <main id="app-container">
        <div class="initial-loader"><div class="spinner"></div><p>Chargement...</p></div>
    </main>

    <div id="bookModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="bookModalTitle">Ajouter un livre</h2>
                <button class="modal-close" onclick="closeBookModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="bookForm" data-is-wishlist="false">
                    <input type="hidden" id="bookId" value="">
                    
                    <div class="form-group">
                        <label for="bookTitre">Titre <span class="required">*</span></label>
                        <input type="text" id="bookTitre" required autocomplete="off">
                    </div>
                    
                    <div class="form-group">
                        <label for="bookAuteur">Auteur <span class="required">*</span></label>
                        <input type="text" id="bookAuteur" required autocomplete="off">
                    </div>
                    
                    <div class="form-group">
                        <label for="bookProprietaire">Propriétaire <span class="required">*</span></label>
                        <select id="bookProprietaire">
                            <option value="J">Jérémy</option>
                            <option value="K">Kelly</option>
                        </select>
                    </div>

                    <div class="form-group collection-only">
                        <label for="bookLieu">📍 Emplacement physique</label>
                        <select id="bookLieu">
                            <option value="J">Chez Jérémy</option>
                            <option value="K">Chez Kelly</option>
                            <option value="Prete">Prêté</option>
                        </select>
                        <small class="form-hint">Où se trouve le livre actuellement ?</small>
                    </div>
                    
                    <div class="form-group collection-only" data-collection-field="note">
                        <label for="bookNote">Note</label>
                        <div class="star-rating" id="starRating">
                            <i class="far fa-star" data-rating="1"></i>
                            <i class="far fa-star" data-rating="2"></i>
                            <i class="far fa-star" data-rating="3"></i>
                            <i class="far fa-star" data-rating="4"></i>
                            <i class="far fa-star" data-rating="5"></i>
                        </div>
                        <input type="hidden" id="bookNote" value="0">
                    </div>
                    
                    <div class="form-group collection-only" data-collection-field="statut">
                        <label for="bookStatut">Statut de lecture</label>
                        <select id="bookStatut">
                            <option value="lu">Lu</option>
                            <option value="en_cours">En cours</option>
                            <option value="a_lire">À lire</option>
                        </select>
                    </div>
                    
                    <div class="modal-actions">
                        <button type="button" class="btn btn-secondary" onclick="closeBookModal()">Annuler</button>
                        <button type="submit" class="btn btn-primary">Enregistrer</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <div id="duplicatesModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header" style="background: linear-gradient(135deg, #f39c12 0%, #d35400 100%);">
                <h2>Nettoyer la bibliothèque</h2>
                <button class="modal-close" onclick="closeModal('duplicatesModal')">&times;</button>
            </div>
            <div class="modal-body" id="duplicatesContent">
                <div class="spinner"></div><p>Recherche des doublons...</p>
            </div>
        </div>
    </div>

    <div id="confirmModal" class="modal" style="display: none;">
        <div class="modal-content modal-small">
            <div class="modal-header"><h2 id="confirmTitle">Confirmation</h2></div>
            <div class="modal-body">
                <p id="confirmMessage"></p>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeConfirmModal()">Annuler</button>
                    <button type="button" id="confirmBtn" class="btn btn-danger">Confirmer</button>
                </div>
            </div>
        </div>
    </div>

    <div id="toastContainer" class="toast-container"></div>
    <script src="script.js"></script>
</body>
</html>
