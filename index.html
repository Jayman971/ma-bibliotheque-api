<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    
    <!-- SEO & Description -->
    <title>Ma Bibliothèque - Gestion de Collection de Livres</title>
    <meta name="description" content="Gérez votre collection de livres, organisez votre wishlist et suivez vos lectures avec Ma Bibliothèque">
    <meta name="keywords" content="bibliothèque, livres, collection, wishlist, lecture, gestion">
    <meta name="author" content="Ma Bibliothèque">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Ma Bibliothèque - Gestion de Collection">
    <meta property="og:description" content="Organisez vos livres et gérez votre wishlist">
    <meta property="og:image" content="/icon-512.png">
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Ma Bibliothèque">
    <meta name="twitter:description" content="Gérez votre collection de livres">
    
    <!-- Theme Color -->
    <meta name="theme-color" content="#2649B2">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="#2649B2">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    
    <!-- Styles -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Font Awesome pour les icônes -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" 
          integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" 
          crossorigin="anonymous" referrerpolicy="no-referrer">
    
    <!-- ✅ Configuration de l'API -->
    <script>
        // ✅ Centralisez l'URL de l'API ici pour faciliter la maintenance
        const API_CONFIG = {
            BASE_URL: 'https://VOTRE-NOM-SERVICE.onrender.com/api/v1',
            HEALTH_CHECK_INTERVAL: 60000 // 60 secondes
        };
    </script>
    
    <!-- ✅ Preconnect pour optimiser les performances -->
    <link rel="preconnect" href="https://VOTRE-NOM-SERVICE.onrender.com">
    <link rel="dns-prefetch" href="https://VOTRE-NOM-SERVICE.onrender.com">
</head>
<body>
    <!-- Header avec navigation -->
    <header>
        <h1 class="app-title">
            <i class="fas fa-book-open"></i> Ma Bibliothèque
        </h1>
        <nav id="mainNav" role="navigation" aria-label="Navigation principale">
            <!-- Les boutons de navigation seront injectés ici par JavaScript après connexion -->
        </nav>
    </header>

    <!-- Contenu principal -->
    <main id="app-container" role="main">
        <!-- Le contenu de l'application sera injecté ici par JavaScript -->
        <div class="initial-loader">
            <div class="spinner"></div>
            <p>Chargement de l'application...</p>
        </div>
    </main>

    <!-- Footer -->
    <footer>
        <p>
            <i class="fas fa-heart" style="color: #e74c3c;"></i> 
            Ma Bibliothèque © 2024 
            <span class="separator">•</span>
            <a href="#" id="apiStatusLink" onclick="openApiHealth(); return false;" style="cursor: pointer;">
                <i class="fas fa-circle" id="apiStatusIcon" style="color: #95a5a6;"></i> 
                <span id="apiStatusText">API Status</span>
            </a>
        </p>
    </footer>

    <!-- Scripts -->
    <script src="script.js"></script>
    
    <!-- ✅ Script amélioré pour vérifier le statut de l'API -->
    <script>
        // Ouvrir la page de health check dans un nouvel onglet
        function openApiHealth() {
            window.open(API_CONFIG.BASE_URL.replace('/api/v1', '/api/v1/health'), '_blank', 'noopener');
        }
        
        // Vérification du statut de l'API (version améliorée)
        async function checkApiStatus() {
            const icon = document.getElementById('apiStatusIcon');
            const text = document.getElementById('apiStatusText');
            const link = document.getElementById('apiStatusLink');
            
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 5000); // Timeout de 5s
                
                const response = await fetch(
                    API_CONFIG.BASE_URL.replace('/api/v1', '/api/v1/health'),
                    { signal: controller.signal }
                );
                
                clearTimeout(timeoutId);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const data = await response.json();
                
                // ✅ Vérification compatible avec le nouveau backend PostgreSQL
                if (data.status === 'healthy' && data.database === 'connected') {
                    icon.style.color = '#28a745'; // Vert
                    icon.className = 'fas fa-circle';
                    text.textContent = 'API opérationnelle';
                    link.title = `Dernière vérification: ${new Date().toLocaleTimeString('fr-FR')}\nBase de données: connectée`;
                } else if (data.status === 'healthy') {
                    icon.style.color = '#ffc107'; // Orange
                    icon.className = 'fas fa-exclamation-circle';
                    text.textContent = 'API (DB issue)';
                    link.title = `Base de données: ${data.database || 'déconnectée'}`;
                } else {
                    icon.style.color = '#ffc107'; // Orange
                    icon.className = 'fas fa-exclamation-triangle';
                    text.textContent = 'API dégradée';
                    link.title = 'API partiellement disponible';
                }
            } catch (error) {
                icon.style.color = '#dc3545'; // Rouge
                icon.className = 'fas fa-times-circle';
                text.textContent = 'API indisponible';
                link.title = `Erreur: ${error.message}\nDernière tentative: ${new Date().toLocaleTimeString('fr-FR')}`;
                console.warn('Health check failed:', error);
            }
        }
        
        // ✅ Vérifier au chargement et périodiquement
        document.addEventListener('DOMContentLoaded', () => {
            checkApiStatus();
            setInterval(checkApiStatus, API_CONFIG.HEALTH_CHECK_INTERVAL);
        });
    </script>
</body>
</html>
