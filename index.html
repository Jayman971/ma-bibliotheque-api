<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    
    <!-- SEO & Description -->
    <title>Ma Bibliothèque - Gestion de Collection de Livres</title>
    <meta name="description" content="Gérez votre collection de livres, organisez votre wishlist et suivez vos lectures avec Ma Bibliothèque">
    <meta name="keywords" content="bibliothèque, livres, collection, wishlist, lecture, gestion, prêts">
    <meta name="author" content="Ma Bibliothèque">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Ma Bibliothèque - Gestion de Collection">
    <meta property="og:description" content="Organisez vos livres, gérez vos prêts et découvrez des recommandations personnalisées">
    <meta property="og:image" content="/icon-512.png">
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Ma Bibliothèque">
    <meta name="twitter:description" content="Gérez votre collection de livres">
    
    <!-- Theme Color -->
    <meta name="theme-color" content="#2649B2">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="#2649B2">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    
    <!-- Styles -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Font Awesome pour les icônes -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" 
          integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" 
          crossorigin="anonymous" referrerpolicy="no-referrer">
    
    <!-- ✅ Configuration de l'API -->
    <script>
        const API_CONFIG = {
            BASE_URL: 'https://ma-bibliotheque-api.onrender.com/api/v1',
            HEALTH_CHECK_INTERVAL: 60000,
            CACHE_DURATION: 60000,
            AUTOCOMPLETE_DELAY: 300, // ms
            DEFAULT_USER_ID: 1 // ID utilisateur par défaut pour les prêts
        };
    </script>
    
    <!-- ✅ Preconnect pour optimiser les performances -->
    <link rel="preconnect" href="https://ma-bibliotheque-api.onrender.com">
    <link rel="dns-prefetch" href="https://ma-bibliotheque-api.onrender.com">
</head>
<body class="light-mode">
    <!-- Header avec navigation -->
    <header>
        <div class="header-content">
            <h1 class="app-title">
                <i class="fas fa-book-open"></i> Ma Bibliothèque
            </h1>
            
            <!-- ✅ Toggle Mode Sombre -->
            <div class="header-controls">
                <button id="darkModeToggle" class="icon-btn" title="Basculer le mode sombre" aria-label="Basculer le mode sombre">
                    <i class="fas fa-moon"></i>
                </button>
                
                <!-- Bouton notifications (prêts en retard) -->
                <button id="notificationsBtn" class="icon-btn" title="Notifications" aria-label="Notifications" style="display: none;">
                    <i class="fas fa-bell"></i>
                    <span class="notification-badge" id="notificationBadge" style="display: none;"></span>
                </button>
                
                <!-- Bouton profil utilisateur -->
                <button id="userProfileBtn" class="icon-btn" title="Profil" aria-label="Profil utilisateur" style="display: none;">
                    <i class="fas fa-user-circle"></i>
                </button>
            </div>
        </div>
        
        <nav id="mainNav" role="navigation" aria-label="Navigation principale">
            <!-- Les boutons de navigation seront injectés ici par JavaScript après connexion -->
        </nav>
    </header>

    <!-- Contenu principal -->
    <main id="app-container" role="main">
        <!-- Le contenu de l'application sera injecté ici par JavaScript -->
        <div class="initial-loader">
            <div class="spinner"></div>
            <p>Chargement de l'application...</p>
        </div>
    </main>

    <!-- ✅ MODALS ET OVERLAYS -->
    
    <!-- ✅ Modal pour ajouter/modifier un livre (Collection ET Wishlist) -->
    <div id="bookModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="bookModalTitle">Ajouter un livre</h2>
                <button class="modal-close" onclick="closeBookModal()" aria-label="Fermer">&times;</button>
            </div>
            <div class="modal-body">
                <form id="bookForm" data-is-wishlist="false">
                    <input type="hidden" id="bookId" value="">
                    
                    <!-- Champs communs (Collection ET Wishlist) -->
                    <div class="form-group">
                        <label for="bookTitre">Titre <span class="required">*</span></label>
                        <input type="text" id="bookTitre" required autocomplete="off" placeholder="Ex: Le Seigneur des Anneaux">
                    </div>
                    
                    <div class="form-group">
                        <label for="bookAuteur">Auteur <span class="required">*</span></label>
                        <input type="text" id="bookAuteur" required autocomplete="off" placeholder="Ex: J.R.R. Tolkien">
                    </div>
                    
                    <div class="form-group">
                        <label for="bookProprietaire">Propriétaire <span class="required">*</span></label>
                        <select id="bookProprietaire">
                            <option value="J">Jérémy</option>
                            <option value="K">Kelly</option>
                        </select>
                    </div>
                    
                    <!-- ✅ Champs UNIQUEMENT pour la Collection (cachés en mode Wishlist) -->
                    <div class="form-group collection-only" data-collection-field="note">
                        <label for="bookNote">Note</label>
                        <div class="star-rating" id="starRating">
                            <i class="far fa-star" data-rating="1"></i>
                            <i class="far fa-star" data-rating="2"></i>
                            <i class="far fa-star" data-rating="3"></i>
                            <i class="far fa-star" data-rating="4"></i>
                            <i class="far fa-star" data-rating="5"></i>
                        </div>
                        <input type="hidden" id="bookNote" value="0">
                        <small class="form-hint">Cliquez sur les étoiles pour noter</small>
                    </div>
                    
                    <div class="form-group collection-only" data-collection-field="statut">
                        <label for="bookStatut">Statut de lecture</label>
                        <select id="bookStatut">
                            <option value="lu">Lu</option>
                            <option value="en_cours">En cours</option>
                            <option value="a_lire">À lire</option>
                        </select>
                    </div>
                    
                    <div class="modal-actions">
                        <button type="button" class="btn btn-secondary" onclick="closeBookModal()">
                            <i class="fas fa-times"></i> Annuler
                        </button>
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save"></i> Enregistrer
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <!-- ✅ Modal pour les prêts -->
    <div id="loanModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="loanModalTitle">Nouveau prêt</h2>
                <button class="modal-close" onclick="closeLoanModal()" aria-label="Fermer">&times;</button>
            </div>
            <div class="modal-body">
                <form id="loanForm">
                    <input type="hidden" id="loanBookId" value="">
                    
                    <div class="form-group">
                        <label for="loanUser">Emprunté par <span class="required">*</span></label>
                        <select id="loanUser" required>
                            <option value="">Sélectionner un utilisateur</option>
                            <!-- Les utilisateurs seront chargés dynamiquement -->
                        </select>
                        <button type="button" class="btn-link" onclick="showAddUserForm()">
                            <i class="fas fa-plus"></i> Ajouter un utilisateur
                        </button>
                    </div>
                    
                    <div class="form-group">
                        <label for="loanDuration">Durée du prêt (jours)</label>
                        <input type="number" id="loanDuration" value="14" min="1" max="90">
                    </div>
                    
                    <div class="form-group">
                        <label>Date d'échéance calculée</label>
                        <p id="calculatedDueDate" class="info-text"></p>
                    </div>
                    
                    <div class="modal-actions">
                        <button type="button" class="btn btn-secondary" onclick="closeLoanModal()">
                            <i class="fas fa-times"></i> Annuler
                        </button>
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-handshake"></i> Créer le prêt
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <!-- ✅ Modal pour ajouter un utilisateur -->
    <div id="userModal" class="modal" style="display: none;">
        <div class="modal-content modal-small">
            <div class="modal-header">
                <h2>Nouvel utilisateur</h2>
                <button class="modal-close" onclick="closeUserModal()" aria-label="Fermer">&times;</button>
            </div>
            <div class="modal-body">
                <form id="userForm">
                    <div class="form-group">
                        <label for="userName">Nom <span class="required">*</span></label>
                        <input type="text" id="userName" required placeholder="Ex: Marie Dupont">
                    </div>
                    
                    <div class="form-group">
                        <label for="userEmail">Email (optionnel)</label>
                        <input type="email" id="userEmail" placeholder="Ex: marie@example.com">
                    </div>
                    
                    <div class="modal-actions">
                        <button type="button" class="btn btn-secondary" onclick="closeUserModal()">
                            <i class="fas fa-times"></i> Annuler
                        </button>
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-user-plus"></i> Ajouter
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <!-- ✅ Modal de confirmation -->
    <div id="confirmModal" class="modal" style="display: none;">
        <div class="modal-content modal-small">
            <div class="modal-header">
                <h2 id="confirmTitle">Confirmation</h2>
                <button class="modal-close" onclick="closeConfirmModal()" aria-label="Fermer">&times;</button>
            </div>
            <div class="modal-body">
                <p id="confirmMessage"></p>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeConfirmModal()">
                        <i class="fas fa-times"></i> Annuler
                    </button>
                    <button type="button" id="confirmBtn" class="btn btn-danger">
                        <i class="fas fa-check"></i> Confirmer
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- ✅ Toast notifications -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- Footer -->
    <footer>
        <p>
            <i class="fas fa-heart" style="color: #e74c3c;"></i> 
            Ma Bibliothèque © 2024 
            <span class="separator">•</span>
            <a href="#" id="apiStatusLink" onclick="openApiHealth(); return false;" style="cursor: pointer;">
                <i class="fas fa-circle" id="apiStatusIcon" style="color: #95a5a6;"></i> 
                <span id="apiStatusText">API Status</span>
            </a>
            <span class="separator">•</span>
            <span id="footerStats">Chargement...</span>
        </p>
    </footer>

    <!-- Scripts -->
    <script src="script.js"></script>
    
    <!-- ✅ Script pour le mode sombre -->
    <script>
        // Initialiser le mode sombre depuis localStorage
        document.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('library_dark_mode');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            
            if (savedTheme === 'true' || (savedTheme === null && prefersDark)) {
                document.body.classList.remove('light-mode');
                document.body.classList.add('dark-mode');
                updateDarkModeIcon(true);
            }
            
            // Toggle mode sombre
            document.getElementById('darkModeToggle')?.addEventListener('click', toggleDarkMode);
        });
        
        function toggleDarkMode() {
            const isDark = document.body.classList.toggle('dark-mode');
            document.body.classList.toggle('light-mode');
            
            localStorage.setItem('library_dark_mode', isDark);
            updateDarkModeIcon(isDark);
            
            // Sauvegarder la préférence sur le serveur si connecté
            if (typeof saveDarkModePreference === 'function') {
                saveDarkModePreference(isDark);
            }
        }
        
        function updateDarkModeIcon(isDark) {
            const icon = document.querySelector('#darkModeToggle i');
            if (icon) {
                icon.className = isDark ? 'fas fa-sun' : 'fas fa-moon';
            }
        }
    </script>
    
    <!-- ✅ Script pour vérifier le statut de l'API -->
    <script>
        // Ouvrir la page de health check dans un nouvel onglet
        function openApiHealth() {
            window.open(API_CONFIG.BASE_URL.replace('/api/v1', '/api/v1/health'), '_blank', 'noopener');
        }
        
        // Vérification du statut de l'API (version améliorée)
        async function checkApiStatus() {
            const icon = document.getElementById('apiStatusIcon');
            const text = document.getElementById('apiStatusText');
            const link = document.getElementById('apiStatusLink');
            
            if (!icon || !text || !link) return;
            
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 5000);
                
                const response = await fetch(
                    API_CONFIG.BASE_URL.replace('/api/v1', '/api/v1/health'),
                    { signal: controller.signal }
                );
                
                clearTimeout(timeoutId);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const data = await response.json();
                
                if (data.status === 'healthy' && data.database === 'connected') {
                    icon.style.color = '#28a745';
                    icon.className = 'fas fa-circle';
                    text.textContent = 'API opérationnelle';
                    link.title = `Dernière vérification: ${new Date().toLocaleTimeString('fr-FR')}\nBase de données: connectée\nCache: ${data.cache_size || 0} entrées`;
                } else if (data.status === 'healthy') {
                    icon.style.color = '#ffc107';
                    icon.className = 'fas fa-exclamation-circle';
                    text.textContent = 'API (DB issue)';
                    link.title = `Base de données: ${data.database || 'déconnectée'}`;
                } else {
                    icon.style.color = '#ffc107';
                    icon.className = 'fas fa-exclamation-triangle';
                    text.textContent = 'API dégradée';
                    link.title = 'API partiellement disponible';
                }
            } catch (error) {
                icon.style.color = '#dc3545';
                icon.className = 'fas fa-times-circle';
                text.textContent = 'API indisponible';
                link.title = `Erreur: ${error.message}\nDernière tentative: ${new Date().toLocaleTimeString('fr-FR')}`;
                console.warn('Health check failed:', error);
            }
        }
        
        // ✅ Vérifier au chargement et périodiquement
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(checkApiStatus, 1000); // Délai initial
            setInterval(checkApiStatus, API_CONFIG.HEALTH_CHECK_INTERVAL);
            setTimeout(updateFooterStats, 1500); // Délai initial pour les stats
        });
        
        // ✅ Mettre à jour les stats du footer
        async function updateFooterStats() {
            const statsElement = document.getElementById('footerStats');
            if (!statsElement) return;
            
            try {
                // Cette fonction sera implémentée dans script.js
                if (typeof getQuickStats === 'function') {
                    const stats = await getQuickStats();
                    statsElement.textContent = `${stats.total || 0} livres • ${stats.loans || 0} prêts actifs`;
                } else {
                    statsElement.textContent = 'Stats chargement...';
                }
            } catch (error) {
                statsElement.textContent = 'Stats non disponibles';
                console.warn('Erreur chargement stats footer:', error);
            }
        }
        
        // Mettre à jour les stats toutes les 5 minutes
        setInterval(updateFooterStats, 300000);
    </script>
</body>
</html>
